<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 대시보드 - 공기업 가산점 시스템</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* 관리자 전용 스타일 */
    .admin-header { background: linear-gradient(135deg, #1f2937 0%, #374151 100%); }

    .login-card {
      max-width: 380px;
      margin: 60px auto;
      padding: 36px;
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
    }
    .login-card h2 { text-align: center; margin-bottom: 24px; font-size: 1.2rem; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 0.95rem;
    }
    .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: var(--transition);
    }
    .btn-login:hover { background: var(--primary-hover); }

    /* 대시보드 */
    .admin-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .btn-primary-sm {
      padding: 9px 18px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary-sm:hover { background: var(--primary-hover); }
    .btn-primary-sm:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-danger-sm {
      padding: 9px 18px;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-danger-sm:hover { opacity: 0.85; }

    /* 테이블 */
    .admin-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.875rem;
    }
    .admin-table thead th {
      padding: 10px 14px;
      background: var(--gray-50);
      color: var(--gray-500);
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: left;
      border-bottom: 2px solid var(--gray-200);
    }
    .admin-table tbody tr:hover td { background: var(--gray-50); }
    .admin-table tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--gray-100);
      vertical-align: middle;
    }

    .btn-sm {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: var(--transition);
    }
    .btn-edit { background: var(--primary-light); color: var(--primary); }
    .btn-edit:hover { background: var(--primary); color: white; }
    .btn-delete-rule { background: var(--danger-bg); color: var(--danger); }
    .btn-delete-rule:hover { background: var(--danger); color: white; }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .status-badge.active { background: var(--success-bg); color: var(--success); }
    .status-badge.inactive { background: var(--gray-100); color: var(--gray-500); }

    .badge-action {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .badge-action.sync { background: var(--primary-light); color: var(--primary); }
    .badge-action.manual { background: var(--warning-bg); color: var(--warning); }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
      overflow-y: auto;
    }
    .modal-box {
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 860px;
      margin: auto;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--gray-200);
    }
    .modal-header h3 { font-size: 1rem; font-weight: 700; }
    .modal-body { padding: 20px 24px; max-height: 70vh; overflow-y: auto; }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--gray-100);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .btn-close-modal {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--gray-400);
      padding: 4px;
    }
    .btn-close-modal:hover { color: var(--gray-700); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--gray-600); margin-bottom: 5px; }
    .form-field input, .form-field select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 0.875rem;
    }
    .form-field input:focus, .form-field select:focus { outline: none; border-color: var(--primary); }

    .rules-table-wrap { overflow-x: auto; margin-top: 12px; }
    .rules-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .rules-table th {
      padding: 8px 10px;
      background: var(--gray-50);
      border-bottom: 2px solid var(--gray-200);
      font-weight: 600;
      text-align: left;
      font-size: 0.73rem;
      color: var(--gray-500);
      text-transform: uppercase;
    }
    .rules-table td { padding: 6px 6px; border-bottom: 1px solid var(--gray-100); }
    .rules-table td input, .rules-table td select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--gray-200);
      border-radius: 4px;
      font-size: 0.8rem;
      min-width: 70px;
    }
    .rules-table td input:focus, .rules-table td select:focus { outline: none; border-color: var(--primary); }

    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── 헤더 ─────────────────────────────────────────────────────── -->
<header class="site-header admin-header">
  <div class="container">
    <h1><span>🔧</span> 관리자 대시보드</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="index.html" style="color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.85rem;">← 메인으로</a>
      <button id="btn-logout" class="btn-danger-sm" style="display:none;">로그아웃</button>
    </div>
  </div>
</header>

<div id="toast-container"></div>

<main class="container">

  <!-- ── 로그인 섹션 ──────────────────────────────────────────────── -->
  <div id="login-section">
    <div class="login-card">
      <h2>🔐 관리자 로그인</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="admin-username">아이디</label>
          <input type="text" id="admin-username" placeholder="admin" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="admin-password">비밀번호</label>
          <input type="password" id="admin-password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div id="login-error" style="color:var(--danger);font-size:0.85rem;margin-bottom:8px;"></div>
        <button type="submit" class="btn-login">로그인</button>
      </form>
      <p style="text-align:center;font-size:0.78rem;color:var(--gray-400);margin-top:16px;">
        기본 계정: admin / admin1234
      </p>
    </div>
  </div>

  <!-- ── 대시보드 ──────────────────────────────────────────────────── -->
  <div id="dashboard-section" style="display:none;">

    <!-- 툴바 -->
    <div class="admin-toolbar">
      <button id="btn-add-company" class="btn-primary-sm">➕ 공기업 신규 등록</button>
      <button id="btn-sync" class="btn-primary-sm" style="background:var(--success);">🔄 DB 동기화 실행</button>
      <button id="btn-logout" class="btn-danger-sm">로그아웃</button>
    </div>

    <!-- 공기업 목록 -->
    <div class="card" style="margin-bottom:24px;">
      <div class="card-header">
        <h2>🏢 공기업 목록 관리</h2>
      </div>
      <div class="card-body" style="padding:0;">
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>공기업명</th>
                <th>직렬</th>
                <th>최대 가산점</th>
                <th>상태</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="company-table-body">
              <tr><td colspan="6" style="text-align:center;color:var(--gray-400);padding:24px;">로딩 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 변경 이력 -->
    <div class="card">
      <div class="card-header">
        <h2>📋 변경 이력 (최근 20건)</h2>
      </div>
      <div class="card-body" style="padding:0;">
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>일시</th>
                <th>구분</th>
                <th>기업 ID</th>
                <th>처리자</th>
                <th>내용</th>
              </tr>
            </thead>
            <tbody id="log-table-body">
              <tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:16px;">로딩 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div><!-- / dashboard-section -->

</main>

<!-- ── 공기업 수정 모달 ─────────────────────────────────────────── -->
<div class="modal-overlay" id="company-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">공기업 수정</h3>
      <button class="btn-close-modal" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <form id="company-form">
        <!-- 기본 정보 -->
        <div class="form-row">
          <div class="form-field">
            <label>공기업명 *</label>
            <input type="text" id="f-name" placeholder="예: 한국전력공사" required />
          </div>
          <div class="form-field">
            <label>직렬 *</label>
            <select id="f-series" required>
              <option value="공통">공통</option>
              <option value="사무직">사무직</option>
              <option value="기술직">기술직</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>최대 가산점 (점) *</label>
            <input type="number" id="f-max-score" placeholder="20" min="1" max="100" required />
          </div>
          <div class="form-field">
            <label style="display:flex;align-items:center;gap:8px;">
              <input type="checkbox" id="f-active" style="width:auto;margin:0;" checked />
              활성화 (is_active)
            </label>
          </div>
        </div>

        <!-- 가산점 룰 -->
        <div style="margin-top:20px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <strong style="font-size:0.9rem;">가산점 룰 목록</strong>
            <button type="button" id="btn-add-rule" class="btn-primary-sm" style="padding:6px 12px;font-size:0.78rem;">+ 룰 추가</button>
          </div>
          <div class="rules-table-wrap">
            <table class="rules-table">
              <thead>
                <tr>
                  <th>계열(category)</th>
                  <th>자격증명</th>
                  <th>급수</th>
                  <th>점수</th>
                  <th>계산방식</th>
                  <th>만점기준</th>
                  <th>직렬한정</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="rules-body"></tbody>
            </table>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-sm" style="padding:8px 18px;border:1px solid var(--gray-300);background:white;border-radius:var(--radius);cursor:pointer;" onclick="document.getElementById('company-modal').style.display='none'">취소</button>
      <button type="submit" form="company-form" class="btn-primary-sm">💾 저장</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
